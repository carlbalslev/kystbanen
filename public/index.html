<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tog mod Helsingør</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #0b1120;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container { width: 100%; max-width: 420px; }

        .header { margin-bottom: 28px; }

        .header-route {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #4a6fa5;
            margin-bottom: 6px;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f0f4ff;
        }

        .trains { display: flex; flex-direction: column; gap: 12px; }

        .train-card {
            background: #111827;
            border: 1px solid #1e2d45;
            border-radius: 14px;
            padding: 20px 22px;
        }

        .train-card.first { border-color: #2a4a7f; box-shadow: 0 0 0 1px #2a4a7f; }
        .train-card.cancelled { opacity: 0.5; }

        .train-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4a6fa5;
            margin-bottom: 10px;
        }

        .train-top {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
        }

        .train-primary {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 12px;
        }

        .train-minutes {
            font-size: 3.4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1;
            color: #e2f0ff;
            font-variant-numeric: tabular-nums;
        }

        .train-minutes-unit {
            font-size: 1rem;
            font-weight: 500;
            color: #4a6fa5;
            margin-left: 4px;
        }

        .train-minutes.urgent { color: #ff6b6b; }

        .train-platform {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .platform-label {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4a6fa5;
            margin-bottom: 3px;
        }

        .platform-number {
            background: #1e3a6e;
            color: #e2f0ff;
            font-size: 2.2rem;
            font-weight: 800;
            padding: 4px 18px;
            border-radius: 8px;
            min-width: 80px;
            text-align: center;
            line-height: 1;
            border: 1px solid #2a5298;
        }

        .platform-number.rt-changed { background: #7c3a00; color: #fef3c7; border-color: #b45309; }

        .train-secondary {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .train-deptime {
            font-size: 0.85rem;
            color: #6b8cba;
            font-variant-numeric: tabular-nums;
        }

        .train-deptime.delayed { color: #ff6b6b; }

        .train-scheduled {
            font-size: 0.8rem;
            color: #2d3f5a;
            text-decoration: line-through;
            font-variant-numeric: tabular-nums;
        }

        .train-delay {
            font-size: 0.8rem;
            color: #ff6b6b;
        }

        .status-cancelled { font-size: 0.85rem; color: #ff4444; font-weight: 600; }

        .train-line { font-size: 0.75rem; color: #2a3a52; margin-left: auto; }

        .refresh-bar {
            margin-top: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .info-bar {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #2d4a6e;
        }

        .info-value {
            font-variant-numeric: tabular-nums;
            color: #4a6fa5;
        }

        .last-updated {
            font-size: 0.7rem;
            color: #2d4a6e;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #2a5298;
            flex-shrink: 0;
        }

        .dot.live { animation: pulse 2.5s infinite; background: #4a90d9; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        .refresh-btn {
            background: none;
            border: 1px solid #1e3a6e;
            color: #4a6fa5;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .loading-card {
            background: #111827;
            border: 1px solid #1e2d45;
            border-radius: 14px;
            height: 118px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2d4a6e;
            font-size: 0.85rem;
        }

        .api-input {
            width: 100%;
            background: #0b1120;
            border: 1px solid #1e3a6e;
            border-radius: 8px;
            color: #e2f0ff;
            padding: 10px 14px;
            font-size: 0.9rem;
            outline: none;
        }

        .api-input:focus { border-color: #2a5298; }

        .save-btn {
            width: 100%;
            background: #1e3a6e;
            border: 1px solid #2a5298;
            border-radius: 8px;
            color: #e2f0ff;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .error-msg {
            background: #1a0f0f;
            border: 1px solid #5a1a1a;
            border-radius: 14px;
            padding: 18px 20px;
            color: #ff8888;
            font-size: 0.85rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    const REFRESH_MS = 30_000;
    const SETTINGS_KEY = 'kystbanen_settings';

    const KNOWN_STATIONS = {
        'København H':  { id: '8600626', lat: 55.6728, lon: 12.5655 },
        'Humlebæk':     { id: '8600858', lat: 55.9667, lon: 12.5333 },
    };

    function loadSettings() {
        try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch { return {}; }
    }

    function saveSettings(s) {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
    }

    function getStations() {
        const s = loadSettings();
        return {
            a: { name: s.stationA || 'København H',  ...KNOWN_STATIONS[s.stationA  || 'København H']  },
            b: { name: s.stationB || 'Humlebæk',     ...KNOWN_STATIONS[s.stationB  || 'Humlebæk']     },
        };
    }

    function distKm(lat1, lon1, lat2, lon2) {
        const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    const app = document.getElementById('app');
    let lastFetched = null;
    let activeStation = null;

    function fmtTime(d) {
        return d.toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function timeToMinutes(t) {
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    }

    function minutesUntil(depTime) {
        const now = new Date();
        const nowMins = now.getHours() * 60 + now.getMinutes();
        return Math.max(0, timeToMinutes(depTime) - nowMins);
    }

    function minutesDiff(from, to) {
        return Math.max(0, timeToMinutes(to) - timeToMinutes(from));
    }

    function renderBoard() {
        const st = getStations();
        const from = activeStation || st.a;
        const to   = from.name === st.a.name ? st.b : st.a;
        app.innerHTML = `
            <div class="header">
                <div class="header-route" style="display:flex;justify-content:space-between;align-items:center">
                    <span>Kystbanen · ${from.name}</span>
                    <button class="refresh-btn" onclick="renderSettings()" style="font-size:0.75rem">⚙ Indstillinger</button>
                </div>
                <div class="header-title">Næste tog mod ${to.name}</div>
            </div>
            <div id="trains" class="trains">
                <div class="loading-card">Henter afgange&hellip;</div>
                <div class="loading-card"></div>
            </div>
            <div class="info-bar">
                <div class="info-row">
                    <span>Data hentet</span>
                    <span class="info-value" id="updated-text">—</span>
                </div>
                <div class="info-row">
                    <span>Siden sidst opdateret</span>
                    <span class="info-value" id="elapsed-text">—</span>
                </div>
                <div class="info-row" style="margin-top:4px">
                    <span class="last-updated"><span class="dot" id="dot"></span></span>
                    <button class="refresh-btn" onclick="fetchDepartures()">Opdater nu</button>
                </div>
            </div>`;
    }

    function renderSettings() {
        const s = loadSettings();
        const stationOptions = Object.keys(KNOWN_STATIONS).map(name =>
            `<option value="${name}">${name}</option>`).join('');

        app.innerHTML = `
            <div class="header">
                <div class="header-route">Kystbanen</div>
                <div class="header-title">Indstillinger</div>
            </div>
            <div class="setup-card" style="background:#111827;border:1px solid #1e2d45;border-radius:14px;padding:22px;display:flex;flex-direction:column;gap:16px">
                <div>
                    <div class="platform-label" style="margin-bottom:6px">Station A</div>
                    <select id="stationA" class="api-input">
                        ${Object.keys(KNOWN_STATIONS).map(n =>
                            `<option value="${n}"${(s.stationA||'København H')===n?' selected':''}>${n}</option>`
                        ).join('')}
                    </select>
                </div>
                <div>
                    <div class="platform-label" style="margin-bottom:6px">Station B</div>
                    <select id="stationB" class="api-input">
                        ${Object.keys(KNOWN_STATIONS).map(n =>
                            `<option value="${n}"${(s.stationB||'Humlebæk')===n?' selected':''}>${n}</option>`
                        ).join('')}
                    </select>
                </div>
                <button class="save-btn" onclick="saveSettingsAndReturn()">Gem</button>
                <button class="refresh-btn" style="width:100%;padding:10px" onclick="boot()">Annuller</button>
            </div>`;
    }

    function saveSettingsAndReturn() {
        saveSettings({
            stationA: document.getElementById('stationA').value,
            stationB: document.getElementById('stationB').value,
        });
        activeStation = null;
        boot();
    }

    function renderCard(dep, index) {
        const scheduled    = dep.time;
        const rt           = dep.rtTime;
        const cancelled    = String(dep.cancelled) === 'true';
        const delayed      = !cancelled && rt && rt !== scheduled;
        const displayTime  = rt || scheduled;
        const minsLeft     = minutesUntil(displayTime);

        const track        = dep.rtTrack || dep.track || null;
        const trackChanged = dep.rtTrack && dep.track && dep.rtTrack !== dep.track;

        const platformHtml = track
            ? `<div class="train-platform">
                 <div class="platform-label">Spor</div>
                 <div class="platform-number${trackChanged ? ' rt-changed' : ''}">${track}</div>
               </div>`
            : '';

        let secondaryHtml = '';
        if (cancelled) {
            secondaryHtml = '<span class="status-cancelled">Aflyst</span>';
        } else if (delayed) {
            const diff = minutesDiff(scheduled, rt);
            secondaryHtml = `
                <span class="train-deptime delayed">${rt}</span>
                <span class="train-scheduled">${scheduled}</span>
                <span class="train-delay">+${diff} min</span>`;
        } else {
            secondaryHtml = `<span class="train-deptime">${scheduled}</span>`;
        }

        const platformHtmlInner = track
            ? `<div class="platform-number${trackChanged ? ' rt-changed' : ''}">${track}</div>`
            : '';

        return `
            <div class="train-card${index === 0 ? ' first' : ''}${cancelled ? ' cancelled' : ''}">
                <div class="train-primary">
                    <div>
                        <div class="train-label">${index === 0 ? 'Næste afgang' : 'Derefter'}</div>
                        <div class="train-minutes${minsLeft <= 5 ? ' urgent' : ''}" onclick="fetchDepartures()" style="cursor:pointer">
                            ${minsLeft}<span class="train-minutes-unit">min</span>
                        </div>
                    </div>
                    ${track ? `<div class="train-platform">
                        <div class="platform-label">Spor</div>
                        ${platformHtmlInner}
                    </div>` : ''}
                </div>
                <div class="train-secondary">
                    ${secondaryHtml}
                    <span class="train-line">${dep.name || ''}</span>
                </div>
            </div>`;
    }

    async function fetchDepartures() {
        const trainsEl  = document.getElementById('trains');
        const updatedEl = document.getElementById('updated-text');
        const dotEl     = document.getElementById('dot');
        if (!trainsEl) return;

        dotEl && dotEl.classList.remove('live');

        const st   = getStations();
        const from = activeStation || st.a;
        const to   = from.name === st.a.name ? st.b : st.a;
        const url  = `/api/departures?id=${from.id}&maxJourneys=40&duration=120`;

        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

            const data = await resp.json();
            const raw = data?.DepartureBoard?.Departure;
            if (!raw) throw new Error('Uventet svar fra API');

            const st   = getStations();
            const from = activeStation || st.a;
            const to   = from.name === st.a.name ? st.b : st.a;
            const deps = (Array.isArray(raw) ? raw : [raw])
                .filter(d => d.direction && d.direction.includes(to.name))
                .slice(0, 2);

            trainsEl.innerHTML = deps.length
                ? deps.map((d, i) => renderCard(d, i)).join('')
                : '<div class="error-msg">Ingen afgange mod Helsingør de næste 2 timer.</div>';

            lastFetched = new Date();
            if (updatedEl) updatedEl.textContent = fmtTime(lastFetched);
            if (dotEl) dotEl.classList.add('live');

        } catch (err) {
            if (trainsEl) trainsEl.innerHTML = `<div class="error-msg">${err.message}</div>`;
        }
    }

    function tickElapsed() {
        const el = document.getElementById('elapsed-text');
        if (!el || !lastFetched) return;
        const secs = Math.floor((new Date() - lastFetched) / 1000);
        if (secs < 60) el.textContent = `${secs} sek`;
        else el.textContent = `${Math.floor(secs / 60)} min ${secs % 60} sek`;
    }

    function start(station) {
        activeStation = station;
        renderBoard();
        fetchDepartures();
    }

    function boot() {
        const st = getStations();
        app.innerHTML = `<div class="loading-card" style="height:200px">Finder din lokation&hellip;</div>`;
        if (!navigator.geolocation) {
            start(st.a);
        } else {
            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude: lat, longitude: lon } = pos.coords;
                const distA = distKm(lat, lon, st.a.lat, st.a.lon);
                const distB = distKm(lat, lon, st.b.lat, st.b.lon);
                start(distA <= distB ? st.a : st.b);
            }, () => {
                start(st.a);
            }, { timeout: 5000 });
        }
    }

    boot();
    setInterval(fetchDepartures, REFRESH_MS);
    setInterval(tickElapsed, 1000);
</script>
</body>
</html>
