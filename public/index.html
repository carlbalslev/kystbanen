<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Næste Tog</title>
    <meta name="theme-color" content="#0b1120">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Næste Tog">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" href="icon-192.png">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
        }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #0b1120;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overscroll-behavior: none;
        }

        .container { width: 100%; max-width: 420px; }

        .header { margin-bottom: 28px; }

        .header-route {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #4a6fa5;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f0f4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title .route-text { flex: 1; }

        .dir-reason {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #2d4a6e;
            background: #111827;
            border: 1px solid #1e2d45;
            border-radius: 6px;
            padding: 2px 7px;
        }

        .trains { display: flex; flex-direction: column; gap: 12px; }

        .train-card {
            background: #111827;
            border: 1px solid #1e2d45;
            border-radius: 14px;
            padding: 20px 22px;
        }

        .train-card.first { border-color: #2a4a7f; box-shadow: 0 0 0 1px #2a4a7f; }
        .train-card.cancelled { opacity: 0.5; }

        .train-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4a6fa5;
            margin-bottom: 10px;
        }

        .train-primary {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 12px;
        }

        .train-minutes {
            font-size: 3.4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1;
            color: #e2f0ff;
            font-variant-numeric: tabular-nums;
        }

        .train-minutes-unit {
            font-size: 1rem;
            font-weight: 500;
            color: #4a6fa5;
            margin-left: 4px;
        }

        .train-minutes.urgent { color: #ff6b6b; }

        .train-platform {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .platform-label {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4a6fa5;
            margin-bottom: 3px;
        }

        .platform-number {
            background: #1e3a6e;
            color: #e2f0ff;
            font-size: 2.2rem;
            font-weight: 800;
            padding: 4px 18px;
            border-radius: 8px;
            min-width: 80px;
            text-align: center;
            line-height: 1;
            border: 1px solid #2a5298;
        }

        .platform-number.rt-changed { background: #7c3a00; color: #fef3c7; border-color: #b45309; }

        .train-secondary {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .train-deptime {
            font-size: 0.85rem;
            color: #6b8cba;
            font-variant-numeric: tabular-nums;
        }

        .train-deptime.delayed { color: #ff6b6b; }

        .train-scheduled {
            font-size: 0.8rem;
            color: #2d3f5a;
            text-decoration: line-through;
            font-variant-numeric: tabular-nums;
        }

        .train-delay { font-size: 0.8rem; color: #ff6b6b; }

        .train-changes {
            font-size: 0.7rem;
            color: #b45309;
            background: #2a1a05;
            border: 1px solid #5a3a10;
            border-radius: 5px;
            padding: 1px 6px;
        }

        .status-cancelled { font-size: 0.85rem; color: #ff4444; font-weight: 600; }

        .train-line { font-size: 0.75rem; color: #2a3a52; margin-left: auto; }

        .info-bar { margin-top: 18px; display: flex; flex-direction: column; gap: 5px; }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #2d4a6e;
        }

        .info-value { font-variant-numeric: tabular-nums; color: #4a6fa5; }

        .last-updated { font-size: 0.7rem; color: #2d4a6e; display: flex; align-items: center; gap: 6px; }

        .dot { width: 7px; height: 7px; border-radius: 50%; background: #2a5298; flex-shrink: 0; }
        .dot.live { animation: pulse 2.5s infinite; background: #4a90d9; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .refresh-btn {
            background: none;
            border: 1px solid #1e3a6e;
            color: #4a6fa5;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .swap-btn {
            background: #1e3a6e;
            border: 1px solid #2a5298;
            color: #e2f0ff;
            width: 38px; height: 38px;
            border-radius: 9px;
            font-size: 1.1rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        .loading-card {
            background: #111827;
            border: 1px solid #1e2d45;
            border-radius: 14px;
            height: 118px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2d4a6e;
            font-size: 0.85rem;
        }

        .api-input {
            width: 100%;
            background: #0b1120;
            border: 1px solid #1e3a6e;
            border-radius: 8px;
            color: #e2f0ff;
            padding: 10px 14px;
            font-size: 16px;
            outline: none;
        }

        .api-input:focus { border-color: #2a5298; }

        .save-btn {
            width: 100%;
            background: #1e3a6e;
            border: 1px solid #2a5298;
            border-radius: 8px;
            color: #e2f0ff;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .station-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #111827;
            border: 1px solid #1e2d45;
            border-radius: 10px;
            padding: 12px 14px;
        }

        .station-row .st-role {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4a6fa5;
        }

        .station-row .st-name { font-size: 1.05rem; color: #e2f0ff; }

        .result-item {
            padding: 11px 14px;
            cursor: pointer;
            font-size: 0.95rem;
            color: #e2f0ff;
            border-bottom: 1px solid #1e2d45;
        }
        .result-item:hover { background: #1e3a6e; }
        .result-item .sub { font-size: 0.7rem; color: #4a6fa5; }

        .list-box {
            background: #111827;
            border: 1px solid #1e3a6e;
            border-radius: 10px;
            overflow: hidden;
            max-height: 320px;
            overflow-y: auto;
        }

        .section-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4a6fa5;
            margin: 4px 2px;
        }

        .error-msg {
            background: #1a0f0f;
            border: 1px solid #5a1a1a;
            border-radius: 14px;
            padding: 18px 20px;
            color: #ff8888;
            font-size: 0.85rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    const REFRESH_MS = 60_000;
    const SETTINGS_KEY = 'kystbanen_settings_v2';

    // Kystbanens stationer med korrekte Rejseplanen-ID'er (hurtigvalg).
    const KYSTBANEN = [
        { name: 'København H',   id: '8600626', lat: 55.673063, lon: 12.565562 },
        { name: 'Nørreport',     id: '8600646', lat: 55.683455, lon: 12.571801 },
        { name: 'Østerport',     id: '8600650', lat: 55.692498, lon: 12.587784 },
        { name: 'Nordhavn',      id: '8600653', lat: 55.705613, lon: 12.590615 },
        { name: 'Hellerup',      id: '8600655', lat: 55.731026, lon: 12.567657 },
        { name: 'Klampenborg',   id: '8600659', lat: 55.777446, lon: 12.587730 },
        { name: 'Skodsborg',     id: '8600661', lat: 55.823534, lon: 12.571288 },
        { name: 'Vedbæk',        id: '8600662', lat: 55.852902, lon: 12.563018 },
        { name: 'Rungsted Kyst', id: '8600663', lat: 55.882224, lon: 12.531475 },
        { name: 'Kokkedal',      id: '8600664', lat: 55.903484, lon: 12.502054 },
        { name: 'Nivå',          id: '8600665', lat: 55.933337, lon: 12.506575 },
        { name: 'Humlebæk',      id: '8600666', lat: 55.963739, lon: 12.533408 },
        { name: 'Espergærde',    id: '8600667', lat: 55.995803, lon: 12.549382 },
        { name: 'Snekkersten',   id: '8600668', lat: 56.009233, lon: 12.583882 },
        { name: 'Helsingør',     id: '8600669', lat: 56.033621, lon: 12.614167 },
    ];

    const DEFAULTS = {
        home: KYSTBANEN.find(s => s.name === 'Humlebæk'),
        away: KYSTBANEN.find(s => s.name === 'København H'),
        noonCutoff: 12,
    };

    const app = document.getElementById('app');
    let settings = DEFAULTS;
    let autoDir = null;        // { from, to, reason } fra GPS/tid
    let userSwapped = false;   // manuel retningsbytte
    let lastFetched = null;
    let refreshTimer = null;

    // ---- indstillinger ----
    function validStation(s) {
        return s && s.id && typeof s.lat === 'number' && typeof s.lon === 'number';
    }

    function loadSettings() {
        try {
            const s = JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {};
            return {
                home: validStation(s.home) ? s.home : DEFAULTS.home,
                away: validStation(s.away) ? s.away : DEFAULTS.away,
                noonCutoff: Number.isInteger(s.noonCutoff) ? s.noonCutoff : DEFAULTS.noonCutoff,
            };
        } catch { return DEFAULTS; }
    }

    function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

    // ---- hjælpere ----
    function distKm(lat1, lon1, lat2, lon2) {
        const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function fmtTime(d) {
        return d.toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    const hhmm = t => (t ? t.slice(0, 5) : '');

    function signedMinutesUntil(dateStr, timeStr) {
        if (!dateStr || !timeStr) return 0;
        const [Y, Mo, D] = dateStr.split('-').map(Number);
        const [h, m] = timeStr.split(':').map(Number);
        const dep = new Date(Y, Mo - 1, D, h, m, 0);
        return Math.round((dep - new Date()) / 60000);
    }

    function minutesUntil(dateStr, timeStr) {
        return Math.max(0, signedMinutesUntil(dateStr, timeStr));
    }

    // Reel (realtids) afgang: brug rt-tid hvis den findes, ellers planlagt.
    function effectiveDeparted(d) {
        const date = (d.rtTime && d.rtDate) ? d.rtDate : d.date;
        const time = d.rtTime || d.time;
        return signedMinutesUntil(date, time) < 0;   // allerede afgået i virkeligheden
    }

    function minutesDiff(date1, t1, date2, t2) {
        const toMs = (ds, ts) => {
            const [Y, Mo, D] = ds.split('-').map(Number);
            const [h, m] = ts.split(':').map(Number);
            return new Date(Y, Mo - 1, D, h, m, 0).getTime();
        };
        return Math.max(0, Math.round((toMs(date2, t2) - toMs(date1, t1)) / 60000));
    }

    // ---- retning ----
    function currentDir() {
        const base = autoDir || { from: settings.home, to: settings.away, reason: 'tid' };
        return userSwapped
            ? { from: base.to, to: base.from, reason: 'manuel' }
            : base;
    }

    function resolveAuto() {
        return new Promise(resolve => {
            const byTime = () => {
                const h = new Date().getHours();
                resolve(h < settings.noonCutoff
                    ? { from: settings.home, to: settings.away, reason: 'tid' }
                    : { from: settings.away, to: settings.home, reason: 'tid' });
            };
            if (!navigator.geolocation) return byTime();
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const { latitude: lat, longitude: lon } = pos.coords;
                    const dh = distKm(lat, lon, settings.home.lat, settings.home.lon);
                    const da = distKm(lat, lon, settings.away.lat, settings.away.lon);
                    const from = dh <= da ? settings.home : settings.away;
                    const to   = from === settings.home ? settings.away : settings.home;
                    resolve({ from, to, reason: 'gps' });
                },
                () => byTime(),
                { timeout: 5000, maximumAge: 60000 }
            );
        });
    }

    // ---- board ----
    function renderBoard() {
        const { from, to, reason } = currentDir();
        const reasonText = { gps: 'GPS', tid: 'Tid', manuel: 'Manuelt' }[reason] || '';
        app.innerHTML = `
            <div class="header">
                <div class="header-route">
                    <span>Kystbanen${reasonText ? ' · ' + reasonText : ''}</span>
                    <button class="refresh-btn" onclick="openSettings()">⚙ Indstillinger</button>
                </div>
                <div class="header-title">
                    <span class="route-text">${from.name} → ${to.name}</span>
                    <button class="swap-btn" title="Byt retning" onclick="swapDir()">⇄</button>
                </div>
            </div>
            <div id="trains" class="trains">
                <div class="loading-card">Henter afgange&hellip;</div>
                <div class="loading-card"></div>
            </div>
            <div class="info-bar">
                <div class="info-row"><span>Data hentet</span><span class="info-value" id="updated-text">—</span></div>
                <div class="info-row"><span>Siden sidst opdateret</span><span class="info-value" id="elapsed-text">—</span></div>
                <div class="info-row" style="margin-top:4px">
                    <span class="last-updated"><span class="dot" id="dot"></span></span>
                    <button class="refresh-btn" onclick="fetchTrip()">Opdater nu</button>
                </div>
            </div>`;
    }

    function swapDir() {
        userSwapped = !userSwapped;
        renderBoard();
        fetchTrip();
    }

    function renderCard(d, index) {
        const cancelled  = d.cancelled;
        const schedTime  = hhmm(d.time);
        const rtTime     = d.rtTime ? hhmm(d.rtTime) : null;
        const delayed    = !cancelled && rtTime && rtTime !== schedTime;

        const effDate = (d.rtTime && d.rtDate) ? d.rtDate : d.date;
        const effTime = d.rtTime || d.time;
        const minsLeft = minutesUntil(effDate, effTime);

        const track = d.rtTrack || d.track;
        const trackChanged = d.rtTrack && d.track && d.rtTrack !== d.track;

        let secondaryHtml;
        if (cancelled) {
            secondaryHtml = '<span class="status-cancelled">Aflyst</span>';
        } else if (delayed) {
            const diff = minutesDiff(d.date, d.time, d.rtDate || d.date, d.rtTime);
            secondaryHtml = `
                <span class="train-deptime delayed">${rtTime}</span>
                <span class="train-scheduled">${schedTime}</span>
                <span class="train-delay">+${diff} min</span>`;
        } else {
            secondaryHtml = `<span class="train-deptime">${schedTime}</span>`;
        }

        const changesHtml = d.changes > 0
            ? `<span class="train-changes">${d.changes} skift</span>` : '';

        return `
            <div class="train-card${index === 0 ? ' first' : ''}${cancelled ? ' cancelled' : ''}">
                <div class="train-primary">
                    <div>
                        <div class="train-label">${index === 0 ? 'Næste afgang' : 'Derefter'}</div>
                        <div class="train-minutes${minsLeft <= 5 ? ' urgent' : ''}" onclick="fetchTrip()" style="cursor:pointer">
                            ${minsLeft}<span class="train-minutes-unit">min</span>
                        </div>
                    </div>
                    ${track ? `<div class="train-platform">
                        <div class="platform-label">Spor</div>
                        <div class="platform-number${trackChanged ? ' rt-changed' : ''}">${track}</div>
                    </div>` : ''}
                </div>
                <div class="train-secondary">
                    ${secondaryHtml}
                    ${changesHtml}
                    <span class="train-line">${d.name || ''}</span>
                </div>
            </div>`;
    }

    async function fetchTrip() {
        const trainsEl  = document.getElementById('trains');
        const updatedEl = document.getElementById('updated-text');
        const dotEl     = document.getElementById('dot');
        if (!trainsEl) return;
        if (dotEl) dotEl.classList.remove('live');

        const { from, to } = currentDir();

        try {
            const resp = await fetch(`/api/trip?from=${from.id}&to=${to.id}`);
            if (!resp.ok) {
                let msg = `HTTP ${resp.status}`;
                try { const e = await resp.json(); if (e.error) msg = e.error; } catch {}
                throw new Error(msg);
            }
            const data = await resp.json();
            // Vinduet fra serveren rækker lidt bagud; behold kun tog der
            // (på realtid) endnu ikke er afgået — inkl. forsinkede der skulle
            // være kørt, men reelt afgår om lidt.
            const deps = (data.departures || []).filter(d => !effectiveDeparted(d)).slice(0, 2);

            trainsEl.innerHTML = deps.length
                ? deps.map((d, i) => renderCard(d, i)).join('')
                : `<div class="error-msg">Ingen tog fra ${from.name} mod ${to.name} de næste timer.</div>`;

            lastFetched = new Date();
            if (updatedEl) updatedEl.textContent = fmtTime(lastFetched);
            if (dotEl) dotEl.classList.add('live');
        } catch (err) {
            trainsEl.innerHTML = `<div class="error-msg">${err.message}</div>`;
        }
    }

    function tickElapsed() {
        const el = document.getElementById('elapsed-text');
        if (!el || !lastFetched) return;
        const secs = Math.floor((new Date() - lastFetched) / 1000);
        el.textContent = secs < 60 ? `${secs} sek` : `${Math.floor(secs / 60)} min ${secs % 60} sek`;
    }

    // ---- indstillinger / stationsvalg ----
    let draft = null;

    function openSettings() {
        draft = { home: { ...settings.home }, away: { ...settings.away }, noonCutoff: settings.noonCutoff };
        renderSettings();
    }

    function renderSettings() {
        app.innerHTML = `
            <div class="header">
                <div class="header-route"><span>Kystbanen</span></div>
                <div class="header-title">Indstillinger</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:14px">
                <div class="station-row">
                    <div style="flex:1">
                        <div class="st-role">Hjem-station</div>
                        <div class="st-name">${draft.home.name}</div>
                    </div>
                    <button class="refresh-btn" onclick="pickStation('home')">Skift</button>
                </div>
                <div class="station-row">
                    <div style="flex:1">
                        <div class="st-role">Anden station</div>
                        <div class="st-name">${draft.away.name}</div>
                    </div>
                    <button class="refresh-btn" onclick="pickStation('away')">Skift</button>
                </div>
                <div class="info-row" style="margin-top:2px">
                    Før kl. ${draft.noonCutoff} antages du på vej fra hjem; efter antages retning hjem.
                    GPS bruges hvis muligt.
                </div>
                <button class="save-btn" onclick="saveAndReturn()">Gem</button>
                <button class="refresh-btn" style="width:100%;padding:10px" onclick="boot()">Annuller</button>
            </div>`;
    }

    function pickStation(slot) {
        const role = slot === 'home' ? 'Hjem-station' : 'Anden station';
        app.innerHTML = `
            <div class="header">
                <div class="header-route"><span>${role}</span></div>
                <div class="header-title">Vælg station</div>
            </div>
            <input class="api-input" id="st-search" type="text" autocomplete="off"
                   placeholder="Søg by eller station…" oninput="onSearchInput()" />
            <div id="st-results" style="margin-top:12px"></div>
            <button class="refresh-btn" style="width:100%;padding:10px;margin-top:14px" onclick="renderSettings()">Tilbage</button>`;
        window.__slot = slot;
        renderResults(KYSTBANEN, 'Kystbanen');
        document.getElementById('st-search').focus();
    }

    function renderResults(list, label) {
        const box = document.getElementById('st-results');
        if (!box) return;
        if (!list.length) { box.innerHTML = `<div class="info-row">Ingen resultater</div>`; return; }
        box.innerHTML = `
            ${label ? `<div class="section-label">${label}</div>` : ''}
            <div class="list-box">
                ${list.map(s => `
                    <div class="result-item" onclick='selectStation(${JSON.stringify(s).replace(/'/g, "&#39;")})'>
                        ${s.name}
                    </div>`).join('')}
            </div>`;
    }

    let searchTimer = null;
    function onSearchInput() {
        const q = document.getElementById('st-search').value.trim();
        clearTimeout(searchTimer);
        if (!q) { renderResults(KYSTBANEN, 'Kystbanen'); return; }
        const local = KYSTBANEN.filter(s => s.name.toLowerCase().includes(q.toLowerCase()));
        searchTimer = setTimeout(async () => {
            try {
                const resp = await fetch(`/api/stations?q=${encodeURIComponent(q)}`);
                const data = await resp.json();
                const remote = (data.stations || [])
                    .filter(s => typeof s.lat === 'number' && typeof s.lon === 'number')
                    .slice(0, 12);
                renderResults(remote.length ? remote : local, remote.length ? 'Søgeresultater' : 'Kystbanen');
            } catch {
                renderResults(local, 'Kystbanen');
            }
        }, 250);
    }

    function selectStation(s) {
        draft[window.__slot] = { name: s.name, id: s.id, lat: s.lat, lon: s.lon };
        renderSettings();
    }

    function saveAndReturn() {
        if (draft.home.id === draft.away.id) {
            alert('Vælg to forskellige stationer');
            return;
        }
        settings = draft;
        saveSettings(settings);
        boot();
    }

    // ---- polling ----
    function startPolling() {
        if (refreshTimer) return;
        refreshTimer = setInterval(fetchTrip, REFRESH_MS);
    }
    function stopPolling() {
        if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
    }
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) { stopPolling(); }
        else { fetchTrip(); startPolling(); }
    });

    // ---- start ----
    function boot() {
        settings = loadSettings();
        userSwapped = false;
        app.innerHTML = `<div class="loading-card" style="height:200px">Finder din retning&hellip;</div>`;
        resolveAuto().then(dir => {
            autoDir = dir;
            renderBoard();
            fetchTrip();
            startPolling();
        });
    }

    boot();
    setInterval(tickElapsed, 1000);
</script>
</body>
</html>
