<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tog mod Helsingør</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            background: #0d0d0f;
            color: #e8e8ea;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container { width: 100%; max-width: 420px; }

        .header { margin-bottom: 28px; }

        .header-route {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #5a5a6a;
            margin-bottom: 6px;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f0f0f2;
        }

        .trains { display: flex; flex-direction: column; gap: 12px; }

        .train-card {
            background: #18181d;
            border: 1px solid #26262e;
            border-radius: 14px;
            padding: 20px 22px;
        }

        .train-card.first { border-color: #3a3a46; }
        .train-card.cancelled { opacity: 0.5; }

        .train-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4a4a5a;
            margin-bottom: 10px;
        }

        .train-top {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
        }

        .train-primary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .train-minutes {
            font-size: 3.4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1;
            color: #f0f0f2;
            font-variant-numeric: tabular-nums;
        }

        .train-minutes-unit {
            font-size: 1rem;
            font-weight: 500;
            color: #5a5a6a;
            margin-left: 4px;
        }

        .train-minutes.urgent { color: #ff6b6b; }

        .train-platform {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .platform-label {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4a4a5a;
            margin-bottom: 3px;
        }

        .platform-number {
            background: #f0f0f2;
            color: #0d0d0f;
            font-size: 1.4rem;
            font-weight: 800;
            padding: 4px 14px;
            border-radius: 8px;
            min-width: 52px;
            text-align: center;
            line-height: 1.5;
        }

        .platform-number.rt-changed { background: #ffd166; }

        .train-secondary {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .train-deptime {
            font-size: 0.85rem;
            color: #8a8a9a;
            font-variant-numeric: tabular-nums;
        }

        .train-deptime.delayed { color: #ff6b6b; }

        .train-scheduled {
            font-size: 0.8rem;
            color: #4a4a5a;
            text-decoration: line-through;
            font-variant-numeric: tabular-nums;
        }

        .train-delay {
            font-size: 0.8rem;
            color: #ff6b6b;
        }

        .status-cancelled { font-size: 0.85rem; color: #ff4444; font-weight: 600; }

        .train-line { font-size: 0.75rem; color: #3a3a4a; margin-left: auto; }

        .refresh-bar {
            margin-top: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .info-bar {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #3a3a4a;
        }

        .info-value {
            font-variant-numeric: tabular-nums;
            color: #5a5a6a;
        }

        .last-updated {
            font-size: 0.7rem;
            color: #3a3a4a;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #3a3a50;
            flex-shrink: 0;
        }

        .dot.live { animation: pulse 2.5s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        .refresh-btn {
            background: none;
            border: 1px solid #2a2a34;
            color: #5a5a6a;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .loading-card {
            background: #18181d;
            border: 1px solid #26262e;
            border-radius: 14px;
            height: 118px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3a3a4a;
            font-size: 0.85rem;
        }

        .error-msg {
            background: #1d1315;
            border: 1px solid #3d2325;
            border-radius: 14px;
            padding: 18px 20px;
            color: #ff8888;
            font-size: 0.85rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    const STATION_ID = '8600626';  // Kobenhavn H
    const DIRECTION  = 'Helsingør';
    const REFRESH_MS = 30_000;

    const app = document.getElementById('app');

    function fmtTime(d) {
        return d.toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function timeToMinutes(t) {
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    }

    function minutesUntil(depTime) {
        const now = new Date();
        const nowMins = now.getHours() * 60 + now.getMinutes();
        return Math.max(0, timeToMinutes(depTime) - nowMins);
    }

    function minutesDiff(from, to) {
        return Math.max(0, timeToMinutes(to) - timeToMinutes(from));
    }

    function renderBoard() {
        app.innerHTML = `
            <div class="header">
                <div class="header-route">Kystbanen · Kobenhavn H</div>
                <div class="header-title">Næste tog mod Helsingør</div>
            </div>
            <div id="trains" class="trains">
                <div class="loading-card">Henter afgange&hellip;</div>
                <div class="loading-card"></div>
            </div>
            <div class="info-bar">
                <div class="info-row">
                    <span>Nuværende tidspunkt</span>
                    <span class="info-value" id="current-time">—</span>
                </div>
                <div class="info-row">
                    <span>Data hentet</span>
                    <span class="info-value" id="updated-text">—</span>
                </div>
                <div class="info-row" style="margin-top:4px">
                    <span class="last-updated"><span class="dot" id="dot"></span></span>
                    <button class="refresh-btn" onclick="fetchDepartures()">Opdater nu</button>
                </div>
            </div>`;
    }

    function renderCard(dep, index) {
        const scheduled    = dep.time;
        const rt           = dep.rtTime;
        const cancelled    = String(dep.cancelled) === 'true';
        const delayed      = !cancelled && rt && rt !== scheduled;
        const displayTime  = rt || scheduled;
        const minsLeft     = minutesUntil(displayTime);

        const track        = dep.rtTrack || dep.track || null;
        const trackChanged = dep.rtTrack && dep.track && dep.rtTrack !== dep.track;

        const platformHtml = track
            ? `<div class="train-platform">
                 <div class="platform-label">Spor</div>
                 <div class="platform-number${trackChanged ? ' rt-changed' : ''}">${track}</div>
               </div>`
            : '';

        let secondaryHtml = '';
        if (cancelled) {
            secondaryHtml = '<span class="status-cancelled">Aflyst</span>';
        } else if (delayed) {
            const diff = minutesDiff(scheduled, rt);
            secondaryHtml = `
                <span class="train-deptime delayed">${rt}</span>
                <span class="train-scheduled">${scheduled}</span>
                <span class="train-delay">+${diff} min</span>`;
        } else {
            secondaryHtml = `<span class="train-deptime">${scheduled}</span>`;
        }

        return `
            <div class="train-card${index === 0 ? ' first' : ''}${cancelled ? ' cancelled' : ''}">
                <div class="train-label">${index === 0 ? 'Næste afgang' : 'Derefter'}</div>
                <div class="train-primary">
                    <div class="train-minutes${minsLeft <= 5 ? ' urgent' : ''}">
                        ${minsLeft}<span class="train-minutes-unit">min</span>
                    </div>
                    ${platformHtml}
                </div>
                <div class="train-secondary">
                    ${secondaryHtml}
                    <span class="train-line">${dep.name || ''}</span>
                </div>
            </div>`;
    }

    async function fetchDepartures() {
        const trainsEl  = document.getElementById('trains');
        const updatedEl = document.getElementById('updated-text');
        const dotEl     = document.getElementById('dot');
        if (!trainsEl) return;

        dotEl && dotEl.classList.remove('live');

        const url = `/api/departures?id=${STATION_ID}&maxJourneys=40&duration=120`;

        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

            const data = await resp.json();
            const raw = data?.DepartureBoard?.Departure;
            if (!raw) throw new Error('Uventet svar fra API');

            const deps = (Array.isArray(raw) ? raw : [raw])
                .filter(d => d.direction && d.direction.includes(DIRECTION))
                .slice(0, 2);

            trainsEl.innerHTML = deps.length
                ? deps.map((d, i) => renderCard(d, i)).join('')
                : '<div class="error-msg">Ingen afgange mod Helsingør de næste 2 timer.</div>';

            if (updatedEl) updatedEl.textContent = fmtTime(new Date());
            if (dotEl) dotEl.classList.add('live');

        } catch (err) {
            if (trainsEl) trainsEl.innerHTML = `<div class="error-msg">${err.message}</div>`;
        }
    }

    function tickClock() {
        const el = document.getElementById('current-time');
        if (el) el.textContent = fmtTime(new Date());
    }

    renderBoard();
    fetchDepartures();
    setInterval(fetchDepartures, REFRESH_MS);
    setInterval(tickClock, 1000);
    tickClock();
</script>
</body>
</html>
